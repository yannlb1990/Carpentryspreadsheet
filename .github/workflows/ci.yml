name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Type check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values so build doesn't crash on missing env vars
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PRICE_ESTIMATION: price_dummy
          STRIPE_PRICE_PRICEGUIDE: price_dummy
          STRIPE_PRICE_BUNDLE: price_dummy
          NEXT_PUBLIC_BASE_URL: https://example.com
          ADMIN_PASSWORD: ci-only
